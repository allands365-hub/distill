<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Distill -- Bug Triage &amp; Release Operator</title>
<style>
  :root{
    --bg:#f6f6f4; --panel:#ffffff; --ink:#1a1a22; --muted:#6b7180; --line:#e6e6e0;
    --accent:#4f46e5; --accent-ink:#ffffff;
    --p0:#dc2626; --p1:#ea580c; --p2:#d9a406; --p3:#64748b;
    --chip:#f0f0ee;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);padding:16px 22px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{margin:0;font-size:20px;letter-spacing:-.02em}
  .brand span{color:var(--muted);font-size:13px}
  .bar{display:flex;gap:10px;margin-top:12px;align-items:flex-start;flex-wrap:wrap}
  textarea{flex:1;min-width:280px;min-height:46px;max-height:140px;resize:vertical;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff}
  button{border:0;border-radius:10px;padding:10px 14px;font:inherit;font-weight:600;cursor:pointer;background:var(--accent);color:var(--accent-ink)}
  button.ghost{background:var(--chip);color:var(--ink)}
  button:disabled{opacity:.5;cursor:default}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1a1a22;color:#fff;padding:10px 16px;border-radius:10px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
  main{padding:18px 22px 40px}
  .board{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(248px,1fr);gap:14px;overflow-x:auto;align-items:start}
  .col{background:transparent}
  .col h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .col h2 b{color:var(--muted);background:var(--chip);border-radius:999px;padding:1px 8px;font-size:11px;font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .card.p-P0{border-left-color:var(--p0)} .card.p-P1{border-left-color:var(--p1)}
  .card.p-P2{border-left-color:var(--p2)} .card.p-P3{border-left-color:var(--p3)}
  .ctitle{font-weight:600;margin:0 0 6px;font-size:14px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--chip);color:var(--ink)}
  .chip.t-bug{background:#fde8e8;color:#b42318} .chip.t-feature{background:#e8f0fe;color:#1d4ed8}
  .chip.t-question{background:#eef2f6;color:#475569} .chip.t-duplicate{background:#f3e8ff;color:#7e22ce}
  .chip.t-spam{background:#f1f1ef;color:#71717a}
  .chip.pri{color:#fff}
  .pri.P0{background:var(--p0)} .pri.P1{background:var(--p1)} .pri.P2{background:var(--p2)} .pri.P3{background:var(--p3)}
  .conf{font-variant-numeric:tabular-nums;color:var(--muted);font-size:11px}
  .reason{color:var(--muted);font-size:12px;margin:6px 0}
  .repro{font-size:12px;white-space:pre-wrap;background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;max-height:120px;overflow:auto}
  .link{font-size:11px;color:var(--accent)}
  .act{margin-top:8px;display:flex;gap:6px}
  .act button{padding:6px 10px;font-size:12px}
  .empty{color:var(--muted);font-size:12px;padding:10px;border:1px dashed var(--line);border-radius:10px;text-align:center}
  .notes{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:18px;white-space:pre-wrap}
  .notes h3{margin-top:0}
  .connbar{display:flex;gap:8px;align-items:center;padding:8px 22px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .connbar .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-right:4px}
  .conn{display:flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--line);border-radius:999px;padding:3px 10px}
  .dot{width:8px;height:8px;border-radius:50%;background:#cbd2dc}
  .dot.on{background:#16a34a}
  .conn button{padding:3px 8px;font-size:11px;border-radius:8px}
  #progress{display:none;align-items:center;gap:10px;margin:14px 22px 0;padding:12px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;color:#1e40af;font-size:14px;font-weight:500}
  #progress.show{display:flex}
  .spinner{width:16px;height:16px;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>Distill</h1><span>AI Bug Triage &amp; Release Operator</span></div>
  <div class="bar">
    <textarea id="batch" placeholder="Paste messy feedback here..."></textarea>
    <button id="triageBtn">Triage</button>
    <button id="gmailBtn" class="ghost">Pull from Gmail</button>
    <button id="notesBtn" class="ghost">Generate Release Notes</button>
  </div>
</header>
<div class="connbar" id="connbar"></div>
<div id="progress"><span class="spinner"></span><span id="progressText"></span></div>
<main>
  <div class="board" id="board"></div>
  <div id="notesPanel"></div>
</main>
<div class="toast" id="toast"></div>
<script>
(function(){
  var cfg = window.__LEMMA_CONFIG__ || {};
  var base = (cfg.apiUrl || window.location.origin).replace(/\/$/,'');
  var s = document.createElement('script');
  s.src = base + '/public/sdk/lemma-client.js';
  s.onload = boot;
  s.onerror = function(){ document.getElementById('board').textContent = 'Failed to load Lemma SDK.'; };
  document.head.appendChild(s);
})();

var client, issues = new Map();
var COLS = [['incoming','Incoming'],['triaged','Triaged'],['needs_approval','Needs Approval'],['approved','Approved'],['fixed','Fixed']];
var _cfg = window.__LEMMA_CONFIG__ || {};
// Connector methods are org-scoped; try the injected config, fall back to this pod's org id.
var ORG_ID = _cfg.orgId || _cfg.organizationId || _cfg.org_id || "019f099b-4f6e-7468-a09a-514639c8e98a";
var CONNECTORS = [["gmail","Gmail"],["slack","Slack"],["linear","Linear"]];

function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2600); }
// Live "triaging in progress" banner — gives the operator visible feedback during
// the ~1-2 min the workflow takes, instead of an unchanged board that looks broken.
var pendingExpected = 0, pendingBaseline = 0;
function showProgress(n){
  pendingExpected = n; pendingBaseline = issues.size;
  var p=document.getElementById('progress');
  p.classList.add('show'); clearTimeout(p._t); p._t=setTimeout(hideProgress, 300000);
  updateProgress();
}
function hideProgress(){ var p=document.getElementById('progress'); if(p){ p.classList.remove('show'); clearTimeout(p._t); } pendingExpected=0; }
// Live queue counter — updates as each triaged card lands so the operator sees progress.
function updateProgress(){
  if(pendingExpected<=0) return;
  var done = Math.max(0, issues.size - pendingBaseline);
  if(done >= pendingExpected){ hideProgress(); return; }
  document.getElementById('progressText').textContent =
    'Triaging… '+done+' of '+pendingExpected+' item'+(pendingExpected===1?'':'s')+' classified. New cards appear below as they’re ready.';
}
function esc(x){ return (x==null?'':String(x)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

async function boot(){
  client = new window.LemmaClient.LemmaClient();
  var st = await client.initialize();
  if (st && st.status && st.status !== 'authenticated'){ client.auth.redirectToAuth(); return; }
  await loadIssues();
  await loadNotes();
  try {
    client.datastore.watchChanges({ table:'issues', onChange:function(f){
      var op = (f.operation||'').toLowerCase();
      if(op==='delete' || op==='remove' || f.deleted){
        issues.delete(f.record_id);
      } else if(f.payload && Object.keys(f.payload).length){
        // Only upsert when the event carries real fields — otherwise a stray
        // empty-payload event would create a blank "?" ghost card.
        issues.set(f.record_id, Object.assign({}, issues.get(f.record_id)||{}, f.payload, {id:f.record_id}));
      }
      render();
      updateProgress();
    }});
  } catch(e){ /* watch optional */ }
  document.getElementById('triageBtn').onclick = onTriage;
  document.getElementById('gmailBtn').onclick = onGmail;
  document.getElementById('notesBtn').onclick = onNotes;
  loadConnections();
}

async function loadIssues(){
  var res = await client.records.list('issues',{limit:200});
  var items = (res && res.items) || res || [];
  issues = new Map(); items.forEach(function(r){ issues.set(r.id, r); });
  render();
}
async function loadNotes(){
  try{
    var res = await client.records.list('releases',{limit:20});
    var items = (res && res.items) || res || [];
    items.sort(function(a,b){ return (b.created_at||'').localeCompare(a.created_at||''); });
    var el = document.getElementById('notesPanel');
    if(!items.length){ el.textContent=''; return; }
    var div = document.createElement('div');
    div.className = 'notes';
    var h3 = document.createElement('h3');
    h3.textContent = 'Latest Release Notes';
    var pre = document.createElement('pre');
    pre.style.whiteSpace = 'pre-wrap';
    pre.textContent = items[0].notes_md || '';
    div.appendChild(h3);
    div.appendChild(pre);
    el.textContent = '';
    el.appendChild(div);
  }catch(e){}
}

async function fnRun(name, data){
  // SDK 0.5.4: client.functions.run(name, options) sends { input_data: options.input }
  // to the backend. The payload MUST be nested under `input`, or the request body
  // goes out empty ({}) and the function runs with no arguments.
  return await client.functions.run(name, { input: data });
}
async function updateIssue(id, status){
  var cur = issues.get(id); if(cur){ cur.status=status; issues.set(id,cur); render(); }
  try { await client.records.update('issues', id, { status:status }); }
  catch(e){
    try { await client.records.update({ tableName:'issues', recordId:id, payload:{status:status} }); }
    catch(e2){ await fnRun('set_status', { issue_id:id, status:status }); }
  }
}
async function onTriage(){
  var ta=document.getElementById('batch'); var text=(ta.value||'').trim();
  if(!text){ toast('Paste some feedback first.'); return; }
  var n = text.split(/\r?\n---\r?\n/).filter(function(s){ return s.trim(); }).length;
  showProgress(n);
  try { await fnRun('start_triage', { raw_text:text }); }
  catch(e){ hideProgress(); toast('Could not start triage — check your connection.'); return; }
  ta.value='';
}
async function onNotes(){
  toast('Generating release notes...');
  try { await fnRun('start_release_notes', {}); } catch(e){}
  // the workflow writes the release row asynchronously; refresh a few times.
  [6000, 12000, 20000].forEach(function(ms){ setTimeout(loadNotes, ms); });
}
async function onGmail(){
  toast('Pulling recent emails from Gmail... triaged issues will appear shortly.');
  try { await fnRun('ingest_gmail', {}); } catch(e){ /* fire-and-forget */ }
}

function buildCard(r){
  var wrap = document.createElement('div');
  wrap.className = 'card' + (r.priority ? ' p-'+r.priority : '');

  var chips = document.createElement('div');
  chips.className = 'chips';

  var typeChip = document.createElement('span');
  typeChip.className = 'chip t-'+(r.type||'');
  typeChip.textContent = r.type || '?';
  chips.appendChild(typeChip);

  if(r.priority){
    var priChip = document.createElement('span');
    priChip.className = 'chip pri '+r.priority;
    priChip.textContent = r.priority;
    chips.appendChild(priChip);
  }
  if(r.confidence != null){
    var conf = document.createElement('span');
    conf.className = 'conf';
    conf.textContent = 'conf '+Number(r.confidence).toFixed(2);
    chips.appendChild(conf);
  }
  wrap.appendChild(chips);

  var title = document.createElement('p');
  title.className = 'ctitle';
  title.textContent = r.title || (r.source_text||'').slice(0,60);
  wrap.appendChild(title);

  if(r.reasoning){
    var reason = document.createElement('div');
    reason.className = 'reason';
    reason.textContent = r.reasoning;
    wrap.appendChild(reason);
  }
  if(r.linked_to){
    var link = document.createElement('div');
    link.className = 'link';
    link.textContent = 'linked to existing issue';
    wrap.appendChild(link);
  }
  if(r.repro_steps){
    var repro = document.createElement('div');
    repro.className = 'repro';
    repro.textContent = r.repro_steps;
    wrap.appendChild(repro);
  }

  if(r.status==='needs_approval'){
    var act = document.createElement('div');
    act.className = 'act';
    var btn = document.createElement('button');
    btn.textContent = 'Approve';
    btn.onclick = function(){ window.approve(r.id); };
    act.appendChild(btn);
    wrap.appendChild(act);
  } else if(r.status==='approved'){
    var act2 = document.createElement('div');
    act2.className = 'act';
    var btn2 = document.createElement('button');
    btn2.className = 'ghost';
    btn2.textContent = 'Mark Fixed';
    btn2.onclick = function(){ window.markFixed(r.id); };
    act2.appendChild(btn2);
    wrap.appendChild(act2);
  }
  if(r.type==='bug'){
    var actL = document.createElement('div');
    actL.className = 'act';
    if(r.external_url){
      var lnkL = document.createElement('a');
      lnkL.className = 'link';
      lnkL.href = r.external_url;
      lnkL.target = '_blank';
      lnkL.rel = 'noopener noreferrer';
      lnkL.textContent = 'View in Linear';
      actL.appendChild(lnkL);
    } else {
      var btnL = document.createElement('button');
      btnL.className = 'ghost';
      btnL.textContent = '→ Linear';
      (function(rid){ btnL.onclick = function(){ window.toLinear(rid); }; })(r.id);
      actL.appendChild(btnL);
    }
    var btnR = document.createElement('button');
    btnR.className = 'ghost';
    btnR.textContent = 'Sandbox repro';
    (function(rid){ btnR.onclick = function(){ window.sandboxRepro(rid); }; })(r.id);
    actL.appendChild(btnR);
    if(r.reproduced){
      var reproTag = document.createElement('span');
      reproTag.className = 'chip';
      reproTag.style.cssText = 'background:#dcfce7;color:#166534;margin-left:4px';
      reproTag.textContent = '✓ reproduced';
      actL.appendChild(reproTag);
    }
    wrap.appendChild(actL);
    if(r.repro_evidence){
      var evDetails = document.createElement('details');
      var evSummary = document.createElement('summary');
      evSummary.style.cssText = 'font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);margin-top:6px';
      evSummary.textContent = 'Sandbox evidence';
      var evPre = document.createElement('div');
      evPre.className = 'repro';
      evPre.textContent = r.repro_evidence;
      evDetails.appendChild(evSummary);
      evDetails.appendChild(evPre);
      wrap.appendChild(evDetails);
    }
  }
  // Dismiss/delete — lets the operator reject a flagged (needs_approval) item or
  // remove any mis-triaged / spam ticket from the board entirely.
  var actD = document.createElement('div');
  actD.className = 'act';
  var btnD = document.createElement('button');
  btnD.className = 'ghost';
  btnD.style.cssText = 'color:#b91c1c;border-color:#fecaca';
  btnD.textContent = (r.status==='needs_approval') ? 'Dismiss' : 'Delete';
  (function(rid){ btnD.onclick = function(){ window.dismiss(rid); }; })(r.id);
  actD.appendChild(btnD);
  wrap.appendChild(actD);
  return wrap;
}

function render(){
  // Skip empty/ghost records (no content) so a stray event never shows a "?" card.
  var all=[...issues.values()].filter(function(r){ return r && (r.type || r.title || r.source_text); });
  var board=document.getElementById('board');
  board.textContent = '';
  COLS.forEach(function(c){
    var rows=all.filter(function(r){return (r.status||'incoming')===c[0];});
    var col = document.createElement('div');
    col.className = 'col';
    var h2 = document.createElement('h2');
    h2.textContent = c[1]+' ';
    var b = document.createElement('b');
    b.textContent = rows.length;
    h2.appendChild(b);
    col.appendChild(h2);
    if(rows.length){
      rows.forEach(function(r){ col.appendChild(buildCard(r)); });
    } else {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = '—';
      col.appendChild(empty);
    }
    board.appendChild(col);
  });
}
window.approve=function(id){ updateIssue(id,'approved'); };
window.markFixed=function(id){ updateIssue(id,'fixed'); };
window.dismiss=async function(id){
  if(!confirm('Remove this ticket from the board? This cannot be undone.')) return;
  issues.delete(id); render();  // optimistic
  try { await client.records.delete('issues', id); }
  catch(e){ try { await client.records.delete({ tableName:'issues', recordId:id }); }
            catch(e2){ toast('Delete failed.'); await loadIssues(); return; } }
  toast('Ticket dismissed.');
};
window.toLinear=async function(id){ toast('Creating Linear issue…'); try{ var r=await fnRun('create_linear_issue',{issue_id:id}); toast(r && r.url ? ('Created: '+r.url) : 'Linear issue created.'); }catch(e){ toast('Linear create failed.'); } };
window.sandboxRepro=async function(id){ toast('Reproducing in sandbox… (takes ~30–60s)'); try{ await fnRun('start_sandbox_repro',{issue_id:id}); }catch(e){} };

async function loadConnections(){
  var connected = {};
  try {
    var res = await client.connectors.accounts.list(ORG_ID, { limit:100 });
    var items = (res && res.items) || res || [];
    items.forEach(function(a){
      if (String(a.status||'').toUpperCase()==='CONNECTED') connected[a.connector_id] = { email:a.email };
    });
  } catch(e){ /* org scope / perms — render all as not-connected */ }
  renderConnections(connected);
}
function renderConnections(connected){
  var bar=document.getElementById('connbar'); if(!bar) return;
  bar.textContent='';
  var lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent='Connections'; bar.appendChild(lbl);
  CONNECTORS.forEach(function(c){
    var id=c[0], name=c[1], on=!!connected[id];
    var pill=document.createElement('span'); pill.className='conn';
    var dot=document.createElement('span'); dot.className='dot'+(on?' on':''); pill.appendChild(dot);
    var t=document.createElement('span');
    t.textContent = name + (on && connected[id].email ? (' · '+connected[id].email) : '');
    pill.appendChild(t);
    if(!on){
      var b=document.createElement('button'); b.className='ghost'; b.textContent='Connect';
      b.onclick=function(){ window.connect(id); }; pill.appendChild(b);
    }
    bar.appendChild(pill);
  });
}
window.connect=async function(connectorId){
  toast('Opening '+connectorId+' connect…');
  try {
    var res = await client.connectors.createConnectRequest(ORG_ID, connectorId);
    var url = res && (res.authorization_url || res.url || res.redirect_url);
    if(url){ window.open(url,'_blank','noopener'); toast('Authorize in the new tab, then it will refresh.'); }
    else { toast('No authorization URL returned (already connected?).'); }
  } catch(e){ toast('Connect failed — an admin may need to create the auth-config first.'); }
  setTimeout(loadConnections, 8000);
};
</script>
</body>
</html>
